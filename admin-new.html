<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F4F0;--surface:#FFFFFF;--text:#1A1A18;--muted:#6B6B66;--accent:#1D9E75;--accent-light:#E1F5EE;--border:#E8E6E0;--danger:#E24B4A;--danger-light:#FCEBEB;--info:#378ADD}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh}
a{text-decoration:none;color:inherit}

nav{background:var(--text);color:#fff;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:600;opacity:0.9}
.logo span{color:#9FE1CB}
.nav-right{display:flex;align-items:center;gap:1rem;font-size:0.85rem}
.view-btn{color:#9FE1CB;display:flex;align-items:center;gap:0.375rem}
.status-indicator{width:8px;height:8px;border-radius:50%;background:#9FE1CB;display:inline-block;margin-right:0.5rem}
.status-indicator.disconnected{background:#E24B4A}

.layout{max-width:1200px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:1fr 380px;gap:1.5rem}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.panel-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:0.875rem;font-weight:500;display:flex;align-items:center;gap:0.5rem}
.panel-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.btn{padding:0.5rem 1.25rem;border-radius:100px;font-size:0.8rem;font-weight:500;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:0.85}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-danger{background:var(--danger-light);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}

.article-list{padding:0.5rem}
.article-item{padding:1rem;border-radius:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;cursor:pointer;transition:background 0.15s;border:1px solid transparent;margin-bottom:0.25rem}
.article-item:hover{background:var(--bg)}
.article-item.selected{background:var(--accent-light);border-color:#9FE1CB}
.article-item-title{font-size:0.9rem;font-weight:500;margin-bottom:0.25rem;line-height:1.4}
.article-item-meta{font-size:0.75rem;color:var(--muted)}
.article-item-actions{display:flex;gap:0.5rem;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:0.85rem}
.icon-btn-edit{background:var(--bg);color:var(--muted)}
.icon-btn-edit:hover{background:var(--accent-light);color:var(--accent)}
.icon-btn-del{background:var(--bg);color:var(--muted)}
.icon-btn-del:hover{background:var(--danger-light);color:var(--danger)}
.status-badge{display:inline-block;padding:0.15rem 0.6rem;border-radius:100px;font-size:0.7rem;font-weight:500}
.status-published{background:#EAF3DE;color:#3B6D11}
.status-draft{background:var(--bg);color:var(--muted);border:1px solid var(--border)}

.form-body{padding:1.5rem}
.form-row{margin-bottom:1.25rem}
label{display:block;font-size:0.8rem;font-weight:500;color:var(--muted);margin-bottom:0.5rem}
input[type=text],input[type=date],select,textarea{width:100%;padding:0.65rem 1rem;border:1px solid var(--border);border-radius:10px;font-family:'Noto Sans TC',sans-serif;font-size:0.875rem;color:var(--text);background:var(--surface);outline:none;transition:border 0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;line-height:1.7}
.form-actions{display:flex;gap:0.75rem;flex-wrap:wrap;padding-top:0.5rem}
.toolbar{display:flex;gap:0.5rem;margin-bottom:0.5rem;flex-wrap:wrap}
.toolbar-btn{padding:0.3rem 0.75rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);font-size:0.8rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s}
.toolbar-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.helper{font-size:0.75rem;color:var(--muted);margin-top:0.375rem}

.setup-panel{padding:1.5rem}
.setup-title{font-size:0.875rem;font-weight:600;margin-bottom:1rem}
.setup-input{width:100%;padding:0.65rem 1rem;border:1px solid var(--border);border-radius:10px;font-family:monospace;font-size:0.8rem;color:var(--text);background:var(--surface);outline:none;margin-bottom:0.75rem}
.setup-input:focus{border-color:var(--accent)}
.setup-hint{font-size:0.75rem;color:var(--muted);margin-bottom:1rem;line-height:1.6}
.setup-actions{display:flex;gap:0.5rem}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--text);color:#fff;padding:0.75rem 1.25rem;border-radius:100px;font-size:0.85rem;font-weight:500;transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.empty-msg{padding:3rem 1.5rem;text-align:center;color:var(--muted);font-size:0.875rem}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#fff;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo">品牌<span>·</span>部落格 <span style="opacity:0.4;margin:0 0.5rem">|</span> 後台管理</div>
    <div class="nav-right">
      <span id="syncStatus"><span class="status-indicator"></span>已連接</span>
      <a href="index.html" class="view-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        查看網站
      </a>
    </div>
  </div>
</nav>

<div class="layout">
  <div>
    <div class="panel" id="setupPanel">
      <div class="panel-header">
        <div class="panel-title"><div class="dot" style="background:#FAC775"></div>GitHub 設定</div>
      </div>
      <div class="setup-panel">
        <p class="setup-title">⚙️ 首次設定（只需一次）</p>
        <label>GitHub Token</label>
        <input type="password" id="tokenInput" class="setup-input" placeholder="輸入你的 GitHub Personal Access Token">
        <div class="setup-hint">
          💡 從 GitHub Settings → Developer settings → Personal access tokens → Tokens (classic) 建立<br>
          只需勾選 <code style="background:#f0f0f0;padding:2px 6px;border-radius:4px">repo</code> 權限
        </div>
        <div class="setup-actions">
          <button class="btn btn-primary" onclick="saveToken()">保存 Token</button>
          <button class="btn btn-ghost" onclick="clearToken()">清除</button>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top:1.5rem">
      <div class="panel-header">
        <div class="panel-title"><div class="dot"></div>所有文章</div>
        <button class="btn btn-primary" id="newBtn" onclick="newArticle()">+ 新增文章</button>
      </div>
      <div id="articleList"></div>
    </div>
  </div>

  <div class="panel" id="editorPanel">
    <div class="panel-header">
      <div class="panel-title"><div class="dot" style="background:#FAC775"></div><span id="editorLabel">新增文章</span></div>
      <button class="btn btn-ghost" onclick="closeEditor()" id="cancelBtn">取消</button>
    </div>
    <div class="form-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <label>文章標題 *</label>
        <input type="text" id="editTitle" placeholder="輸入文章標題">
      </div>
      <div class="form-row">
        <label>文章摘要</label>
        <textarea id="editExcerpt" rows="2" placeholder="顯示在列表頁的簡短描述"></textarea>
      </div>
      <div class="form-row">
        <label>文章內容（支援 HTML 標籤）</label>
        <div class="toolbar">
          <button class="toolbar-btn" onclick="insertTag('h2')">H2 標題</button>
          <button class="toolbar-btn" onclick="insertTag('h3')">H3 標題</button>
          <button class="toolbar-btn" onclick="insertTag('p')">段落</button>
          <button class="toolbar-btn" onclick="insertTag('strong')">粗體</button>
          <button class="toolbar-btn" onclick="insertTag('ul-li')">清單</button>
          <button class="toolbar-btn" onclick="insertTag('blockquote')">引用</button>
        </div>
        <textarea id="editContent" rows="10" placeholder="<p>在這裡輸入文章內容...</p>"></textarea>
      </div>
      <div class="form-row">
        <label>標籤（用逗號分隔）</label>
        <input type="text" id="editTags" placeholder="例如：產品介紹, 使用心得, 健康知識">
      </div>
      <div class="form-row">
        <label>封面圖片網址</label>
        <input type="text" id="editCover" placeholder="https://...">
      </div>
      <div class="form-row">
        <label>發布日期</label>
        <input type="date" id="editDate">
      </div>
      <div class="form-row">
        <label>狀態</label>
        <select id="editStatus">
          <option value="draft">草稿（不公開）</option>
          <option value="published">已發布（公開）</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="saveBtn" onclick="saveArticle()">儲存並發布</button>
        <button class="btn btn-ghost" onclick="closeEditor()">取消</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let articles = [];
let editingId = null;
let token = localStorage.getItem('gh_token') || '';
const owner = 'mandychen111111-commits';
const repo = 'brand-blog';

function today(){const d=new Date();return d.toISOString().split('T')[0]}

function saveToken(){
  const t = document.getElementById('tokenInput').value.trim();
  if(!t){showToast('請輸入 Token');return}
  localStorage.setItem('gh_token', t);
  token = t;
  document.getElementById('tokenInput').value = '';
  document.getElementById('setupPanel').style.display = 'none';
  showToast('Token 已保存！');
  loadArticles();
}

function clearToken(){
  if(!confirm('確定要清除 Token 嗎？')) return;
  localStorage.removeItem('gh_token');
  token = '';
  document.getElementById('setupPanel').style.display = 'block';
  articles = [];
  renderList();
  showToast('Token 已清除');
}

async function loadArticles(){
  if(!token){
    document.getElementById('setupPanel').style.display = 'block';
    return;
  }
  document.getElementById('setupPanel').style.display = 'none';
  try {
    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/articles.json`, {
      headers: {'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3.raw'}
    });
    if(!res.ok) throw new Error('讀取失敗');
    articles = await res.json();
    updateSyncStatus(true);
  } catch(e) {
    articles = [];
    updateSyncStatus(false);
    showToast('連接失敗，請檢查 Token');
  }
  renderList();
}

function updateSyncStatus(ok){
  const el = document.getElementById('syncStatus');
  if(ok){
    el.innerHTML = '<span class="status-indicator"></span>已連接';
  } else {
    el.innerHTML = '<span class="status-indicator disconnected"></span>未連接';
  }
}

async function saveToGithub(){
  if(!token){
    showToast('請先設定 Token');
    return false;
  }
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(articles, null, 2))));
  
  try {
    const getRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/articles.json`, {
      headers: {'Authorization': `token ${token}`}
    });
    const data = await getRes.json();
    const sha = data.sha;

    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/articles.json`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: '更新文章',
        content: content,
        sha: sha
      })
    });
    if(!res.ok) throw new Error('上傳失敗');
    showToast('已發布到網站！');
    return true;
  } catch(e) {
    showToast('發布失敗：' + e.message);
    return false;
  }
}

function renderList(){
  const el = document.getElementById('articleList');
  if(!token){
    el.innerHTML = '<div class="empty-msg">請先設定 GitHub Token</div>';
    return;
  }
  if(articles.length === 0){
    el.innerHTML = '<div class="empty-msg">還沒有文章，點「新增文章」開始吧！</div>';
  } else {
    el.innerHTML = '<div class="article-list">' + articles.map(a => `
      <div class="article-item ${editingId===a.id?'selected':''}" onclick="editArticle('${a.id}')">
        <div style="flex:1;min-width:0">
          <div class="article-item-title">${a.title||'（無標題）'}</div>
          <div class="article-item-meta">${a.date||''} &nbsp;·&nbsp; <span class="status-badge status-${a.status}">${a.status==='published'?'已發布':'草稿'}</span></div>
        </div>
        <div class="article-item-actions">
          <button class="icon-btn icon-btn-edit" onclick="event.stopPropagation();editArticle('${a.id}')" title="編輯">✏️</button>
          <button class="icon-btn icon-btn-del" onclick="event.stopPropagation();deleteArticle('${a.id}')" title="刪除">🗑</button>
        </div>
      </div>`).join('') + '</div>';
  }
}

function newArticle(){
  editingId = null;
  document.getElementById('editorLabel').textContent = '新增文章';
  document.getElementById('editId').value = '';
  document.getElementById('editTitle').value = '';
  document.getElementById('editExcerpt').value = '';
  document.getElementById('editContent').value = '';
  document.getElementById('editTags').value = '';
  document.getElementById('editCover').value = '';
  document.getElementById('editDate').value = today();
  document.getElementById('editStatus').value = 'published';
  renderList();
}

function editArticle(id){
  const a = articles.find(x=>x.id===id);
  if(!a) return;
  editingId = id;
  document.getElementById('editorLabel').textContent = '編輯文章';
  document.getElementById('editId').value = a.id;
  document.getElementById('editTitle').value = a.title||'';
  document.getElementById('editExcerpt').value = a.excerpt||'';
  document.getElementById('editContent').value = a.content||'';
  document.getElementById('editTags').value = (a.tags||[]).join(', ');
  document.getElementById('editCover').value = a.cover||'';
  document.getElementById('editDate').value = a.date||today();
  document.getElementById('editStatus').value = a.status||'published';
  renderList();
}

async function saveArticle(){
  const title = document.getElementById('editTitle').value.trim();
  if(!title){showToast('請輸入文章標題');return}
  
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 發布中...';

  const tagsRaw = document.getElementById('editTags').value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(Boolean) : [];
  const data = {
    id: editingId || String(Date.now()),
    title,
    excerpt: document.getElementById('editExcerpt').value,
    content: document.getElementById('editContent').value,
    tags,
    cover: document.getElementById('editCover').value,
    date: document.getElementById('editDate').value,
    status: document.getElementById('editStatus').value
  };
  
  if(editingId){
    const idx = articles.findIndex(a=>a.id===editingId);
    if(idx>=0) articles[idx]=data;
  } else {
    articles.unshift(data);
  }

  const ok = await saveToGithub();
  if(ok){
    editingId = null;
    renderList();
  }
  
  btn.disabled = false;
  btn.innerHTML = '儲存並發布';
}

async function deleteArticle(id){
  if(!confirm('確定要刪除這篇文章嗎？')) return;
  articles = articles.filter(a=>a.id!==id);
  if(editingId===id) editingId=null;
  const ok = await saveToGithub();
  if(ok) renderList();
}

function closeEditor(){
  editingId=null;
  renderList();
}

function insertTag(type){
  const ta = document.getElementById('editContent');
  const pos = ta.selectionStart;
  let insert='';
  if(type==='h2') insert='<h2>標題文字</h2>\n';
  else if(type==='h3') insert='<h3>小標題</h3>\n';
  else if(type==='p') insert='<p>段落文字</p>\n';
  else if(type==='strong') insert='<strong>粗體文字</strong>';
  else if(type==='ul-li') insert='<ul>\n  <li>項目一</li>\n  <li>項目二</li>\n</ul>\n';
  else if(type==='blockquote') insert='<blockquote>引用文字</blockquote>\n';
  ta.value = ta.value.slice(0,pos) + insert + ta.value.slice(pos);
  ta.focus();
  ta.selectionStart = ta.selectionEnd = pos + insert.length;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

loadArticles();
newArticle();
</script>
</body>
</html>
