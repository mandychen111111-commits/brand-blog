<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--surface:#FFFFFF;--text:#1A1A18;--muted:#6B6B66;--accent:#1D9E75;--accent-light:#E1F5EE;--border:#E8E6E0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300}
a{text-decoration:none;color:inherit}
nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Noto Serif TC',serif;font-size:1.25rem;font-weight:600}
.logo span{color:var(--accent)}
.back-btn{font-size:0.875rem;color:var(--muted);display:flex;align-items:center;gap:0.375rem;transition:color 0.2s}
.back-btn:hover{color:var(--text)}

.cover{width:100%;max-height:480px;object-fit:cover;display:block}
.cover-placeholder{width:100%;height:320px;background:linear-gradient(135deg,#E1F5EE 0%,#9FE1CB 100%)}

article{max-width:720px;margin:0 auto;padding:3rem 2rem 6rem}
.article-tags{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.article-tag{font-size:0.75rem;padding:0.3rem 0.875rem;border-radius:100px;background:var(--accent-light);color:var(--accent);font-weight:500}
.article-title{font-family:'Noto Serif TC',serif;font-size:clamp(1.5rem,4vw,2.5rem);font-weight:600;line-height:1.35;margin-bottom:1rem}
.article-meta{font-size:0.85rem;color:var(--muted);margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.article-content{font-size:1rem;line-height:2;color:var(--text)}
.article-content p{margin-bottom:1.5rem}
.article-content h2{font-family:'Noto Serif TC',serif;font-size:1.4rem;font-weight:600;margin:2.5rem 0 1rem}
.article-content h3{font-size:1.1rem;font-weight:500;margin:2rem 0 0.75rem}
.article-content ul,.article-content ol{padding-left:1.5rem;margin-bottom:1.5rem}
.article-content li{margin-bottom:0.5rem}
.article-content img{width:100%;border-radius:8px;margin:1.5rem 0}
.article-content blockquote{border-left:3px solid var(--accent);padding:0.5rem 1.25rem;margin:1.5rem 0;color:var(--muted);font-style:italic}
.article-content strong{font-weight:500}

.back-link{display:inline-flex;align-items:center;gap:0.5rem;color:var(--accent);font-size:0.875rem;margin-top:3rem;font-weight:500}
footer{border-top:1px solid var(--border);padding:2rem;text-align:center;font-size:0.8rem;color:var(--muted)}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">品牌<span>·</span>部落格</a>
    <a href="index.html" class="back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      返回列表
    </a>
  </div>
</nav>

<div id="coverArea"></div>

<article>
  <div class="article-tags" id="articleTags"></div>
  <h1 class="article-title" id="articleTitle">載入中...</h1>
  <div class="article-meta" id="articleMeta"></div>
  <div class="article-content" id="articleContent"></div>
  <a href="index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    返回所有文章
  </a>
</article>

<footer>© 2025 品牌部落格</footer>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');

async function load() {
  try {
    const res = await fetch('articles.json');
    const articles = await res.json();
    const article = articles.find(a => String(a.id) === String(id));
    if (!article) { document.getElementById('articleTitle').textContent = '找不到文章'; return; }

    document.title = article.title;
    const coverArea = document.getElementById('coverArea');
    if (article.cover) {
      coverArea.innerHTML = `<img class="cover" src="${article.cover}" alt="${article.title}">`;
    } else {
      coverArea.innerHTML = `<div class="cover-placeholder"></div>`;
    }

    document.getElementById('articleTags').innerHTML = (article.tags||[]).map(t=>`<span class="article-tag">${t}</span>`).join('');
    document.getElementById('articleTitle').textContent = article.title;
    document.getElementById('articleMeta').textContent = article.date || '';
    document.getElementById('articleContent').innerHTML = article.content || '';
  } catch(e) {
    document.getElementById('articleTitle').textContent = '載入失敗';
  }
}

load();
</script>
</body>
</html>
